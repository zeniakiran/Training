<!DOCTYPE html>
<html>
<head>
  <title>My Space Page</title>
<!-- <link rel="stylesheet" href="style.css"> -->
 <style>
  body {
      background-color: darkblue;
      background-image: linear-gradient(to bottom, darkblue, navy);
      background-repeat: no-repeat;
      background-position: top center;
      font-family: Arial, sans-serif;
    }
 
    .page-header {
      background-image: linear-gradient(to right, purple, coral);
      border-radius: 16px;
      text-align: center;
      color: white;
    }
 
    .fact-card {
      background-color: midnightblue;
      border-radius: 12px;
      color: white;
    }
 
    .fact-card h2 {
      color: coral;
    }
 
    .star {
      width: 60px;
      height: 60px;
      background-color: yellow;
      border-radius: 50%;
      animation: twinkle 2s infinite alternate;
    }
 
    @keyframes twinkle {
      from { background-color: yellow; }
      to   { background-color: white; }
    }
 
    .footer-text {
      text-align: center;
      color: coral;
    }
 </style>
</head>
<body>

  <div class="page-header">
    <h1>My Space Page</h1>
    <p>Welcome to my corner of the galaxy!</p>
  </div>

  <div class="fact-card">
    <h2>Fun Space Fact</h2>
    <p>The Sun is so big that one million Earths could fit inside it.</p>
  </div>

  <div class="star"></div>

  <p class="footer-text">Made by ___________</p>

</body>
</html>
