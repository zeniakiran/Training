<!DOCTYPE html>
<html>
<head>
  <title>My Food Menu</title>
  <style>
    body {
      font-family: Arial;
      background: #fff8f0;
      padding: 30px;
      text-align: center;
    }

    h1 { color: #e65c00; }

    /* Sibling Selector - styles the paragraph right after h1 */
    h1 + p {
      background: #ffe0b2;
      padding: 10px 20px;
      border-radius: 8px;
      color: #bf360c;
      display: inline-block;
    }

    ul { padding: 0; margin-top: 20px; }

    /* Child Selector - styles only direct li children of ul */
    ul > li {
      list-style: none;
      font-size: 18px;
      font-weight: bold;
      color: #5d4037;
      padding: 10px 20px;
      margin: 6px auto;
      width: 260px;
      background: #fff3e0;
      border-radius: 8px;
    }

    /* nth-child - highlights the 3rd item as Chef's Special */
    ul li:nth-child(3) {
      background: #ffe082;
      color: #e65c00;
    }

    .desc {
      color: #555;
      margin-top: 20px;
      font-size: 15px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    /* first-letter - makes the first letter big and bold */
    .desc::first-letter {
      font-size: 220%;
      color: #e65c00;
      font-weight: bold;
    }

    .links { margin-top: 25px; }

    /* Hover Effect - links glow when mouse moves over them */
    a {
      color: #e65c00;
      text-decoration: none;
      font-size: 15px;
      margin: 0 12px;
      padding: 8px 18px;
      border: 2px solid #e65c00;
      border-radius: 8px;
    }

    a:hover {
      background: #e65c00;
      color: white;
    }
  </style>
</head>
<body>
  <h1>My Food Menu</h1>
  <p>Pick your favourite dish and dig in!</p>

  <ul>
    <li>Pizza</li>
    <li>Burger</li>
    <li>Tacos — Chef's Special!</li>
    <li>Noodles</li>
    <li>Ice Cream</li>
  </ul>

  <p class="desc">Every dish on this menu is made with love and
  loads of flavour. Try them all and find your favourite!</p>

  <div class="links">
    <a href="#">Order Now</a>
    <a href="#">See More</a>
  </div>
</body>
</html>
