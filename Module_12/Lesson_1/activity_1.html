<!DOCTYPE html>
<html>
<head>
  <title>My Hobby Cards</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- STEP 1 - Bootstrap CSS link -->
  <link rel="stylesheet"
    href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

  <style>
    body {
      background-color: #f9f9f9;
      font-family: Arial, sans-serif;
      padding: 30px 15px;
    }
    h1 {
      text-align: center;
      color: #FF5A43;
    }
    .hobby-card {
      text-align: center;
      border: 2px solid #FF5A43;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      background-color: #fff8e1;
    }
    .hobby-card h3 {
      color: #FF5A43;
    }
  </style>
</head>
<body>

  <h1>My Hobby Cards</h1>

  <!-- STEP 2 - container keeps the layout neat and centred -->
  <div class="container">

    <!-- STEP 3 - row holds all the columns in one horizontal line -->
    <div class="row">

      <!-- STEP 4 - col-12: full width on phones
                   col-md-6: half width on tablets
                   col-lg-4: one-third on desktops -->
      <div class="col-12 col-md-6 col-lg-4">
        <div class="hobby-card">
          <h3>Drawing</h3>
          <p>I love sketching animals and comic characters.</p>
        </div>
      </div>

      <div class="col-12 col-md-6 col-lg-4">
        <div class="hobby-card">
          <h3>Football</h3>
          <p>I play football every evening with my friends.</p>
        </div>
      </div>

      <div class="col-12 col-md-12 col-lg-4">
        <div class="hobby-card">
          <h3>Reading</h3>
          <p>My favourite books are adventure stories.</p>
        </div>
      </div>

    </div>
  </div>

  <!-- STEP 5 - Bootstrap JS script -->
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">
  </script>

</body>
</html>
